name: CI/CD

on:
  push:
    branches: [main]

# Only one deployment at a time
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: self-hosted
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
      SSH_KEY_PATH: ~/.ssh/wikantik-deploy
      IMAGE_NAME: wikantik
      IMAGE_TAG: latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Unit tests
        run: mvn clean test -T 1C -B

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Transfer image to production
        run: |
          docker save $IMAGE_NAME:$IMAGE_TAG | gzip | \
            ssh -i $SSH_KEY_PATH -o StrictHostKeyChecking=accept-new \
            $DEPLOY_USER@$DEPLOY_HOST 'gunzip | docker load'

      - name: Update config on production
        run: |
          ssh -i $SSH_KEY_PATH $DEPLOY_USER@$DEPLOY_HOST "
            cd $DEPLOY_DIR
            git pull --ff-only origin main
          "

      - name: Deploy on production
        run: |
          ssh -i $SSH_KEY_PATH $DEPLOY_USER@$DEPLOY_HOST "
            cd $DEPLOY_DIR
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps wikantik
          "

      - name: Verify deployment
        run: |
          sleep 30
          ssh -i $SSH_KEY_PATH $DEPLOY_USER@$DEPLOY_HOST "
            curl -fsS http://localhost:8080/wiki/Main > /dev/null \
              && echo 'Deployment verified' \
              || echo 'WARNING: Health check failed'
          "

      - name: Clean up old Docker images
        if: always()
        run: docker image prune -f --filter "until=168h"
