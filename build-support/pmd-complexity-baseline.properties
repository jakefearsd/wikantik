# CI complexity ratchet — burn-down baseline for the `complexity-gate` Maven
# profile (root pom.xml), consumed via maven-pmd-plugin's
# <excludeFromFailureFile>.
#
# WHAT THIS IS
#   Every entry below is a class that ALREADY violated one or more rules in
#   build-support/pmd-complexity-ruleset.xml (CyclomaticComplexity,
#   CognitiveComplexity, NPathComplexity, NcssCount, ExcessiveParameterList,
#   GodClass, TooManyMethods) at the time this file was generated. The gate
#   (`mvn pmd:check -Pcomplexity-gate`) fails the build on any NEW violation
#   not listed here — it does not fail on the pre-existing debt below.
#
# FORMAT (verified empirically against maven-pmd-plugin 3.28.0 / PMD 7.17.0 —
# see .superpowers/sdd/task-5-report.md for the full probe transcript):
#   fully.qualified.ClassName=Rule1,Rule2,...
#   The right-hand side IS rule-specific: a bare/irrelevant rule name does
#   NOT suppress a violation of a different rule on the same class (tested:
#   `Foo=GodClass` did not silence a CyclomaticComplexity finding on Foo).
#   Comma-separated rule lists work and extra/inapplicable rule names in the
#   list are harmless no-ops. There is no line-number or method-level
#   granularity — one entry blanket-excludes ALL current and future
#   violations of the named rule(s) for that class.
#
# BURN-DOWN RULE
#   Entries only ever come OUT. Shrink or decompose the class until PMD stops
#   flagging it for a given rule, then delete that rule from its line (or the
#   whole line once every rule clears). Adding a brand-new line — or adding a
#   rule to an existing line — is only for classes that legitimately did not
#   trip that rule before; it requires explicit justification in the PR/
#   commit description, since it is new debt being fenced off rather than an
#   inherited one being tracked.
#
# REGENERATING FROM SCRATCH (only for a full rebuild, e.g. after a ruleset
# threshold change — NOT for routine burn-down, which is a manual per-line
# edit). GOTCHA discovered while building this file: <excludeFromFailureFile>
# suppresses matching violations from the generated target/pmd.xml report
# itself (both the `pmd:pmd` report goal and `pmd:check`), not just from the
# check goal's failure count. Regenerating against a NON-empty baseline
# silently drops every already-excluded class from the report instead of
# reflecting its current (possibly improved or worsened) state — you MUST
# empty this file before rescanning, or the "full" baseline you write back
# will silently be missing every class it already contained:
#   printf '' > build-support/pmd-complexity-baseline.properties
#   mvn clean -q
#   mvn -q -T 1C pmd:pmd -Pcomplexity-gate
#   # then union each module's target/pmd.xml into FQCN=Rule1,Rule2 lines,
#   # one per class, rules and classes sorted alphabetically for a stable diff.
#
# Generated 2026-07-03 against commit 2edf35dcfb (post Tasks 1-4 decomposition
# of AdminKnowledgeResource + DefaultContextRetrievalService). 156 classes /
# 315 class-rule pairs from a clean reactor-wide scan (371 raw PMD
# violations, collapsed per class+rule since the exclude file has no
# per-occurrence granularity). AdminKnowledgeResource needed no entry (fully
# clean — zero violations). DefaultContextRetrievalService still needs
# GodClass + ExcessiveParameterList below — see task-5-report.md for why
# (still a 12-arg DI composition root / facade over 4 unrelated interface
# methods after extracting three collaborators; LOC dropped 644->396) rather
# than an incomplete refactor. Note: its `similarity` (NodeMentionSimilarity)
# constructor arg is dead (assigned, never read — pre-existing); dropping it
# is the first free step toward burning down ExcessiveParameterList.
#
# JUSTIFICATION — entries born WITH this baseline (created by the same
# decomposition branch, per this file's own new-line rule):
#   com.wikantik.rest.knowledge.KgProposalAdminHandlers, KgNodeAdminHandlers,
#   KgEdgeAdminHandlers, KgJudgeAdminHandlers, and
#   com.wikantik.knowledge.retrieval.PageListEngine carry verbatim-moved
#   method bodies out of the former AdminKnowledgeResource (WMC 288, 1666
#   LOC) and DefaultContextRetrievalService (WMC 141). The extraction was
#   deliberately behavior-preserving — bodies byte-identical, guarded by 134
#   characterization tests — so the METHOD-level complexity (CC/cognitive/
#   NPath of individual handlers like doBulkProposalAction) moved with the
#   code instead of being rewritten. Fencing it here is redistribution, not
#   elimination: each class is 5-10x smaller than its source and now has a
#   single concern, and simplifying the hot methods is follow-up burn-down
#   work (safe now precisely because each lives in a small, tested unit).
#   AdminKnowledgeIo, HubProposalAdminHandlers, KgMaintenanceAdminHandlers,
#   RelatedPagesFinder, and ContributingChunkAssembler were born clean (no
#   entries).
#
# BURN-DOWN HISTORY
#   2026-07-03: com.wikantik.ui.SemanticHeadRenderer removed (all 6 rules —
#   CognitiveComplexity, CyclomaticComplexity, ExcessiveParameterList,
#   GodClass, NPathComplexity, NcssCount) after decomposition into
#   PageSeoModel + JsonLdEmitter + HeadTagWriter, all three born clean.
#   First entry burned down since the baseline was created.
