# Opt-in observability overlay — Prometheus + Grafana.
#
# Stacks on top of the base + an env overlay. Bring it up explicitly:
#   WIKANTIK_OBSERVABILITY=1 bin/container.sh -e prod up -d
# or directly:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  -f docker-compose.observability.yml -p repo up -d
#
# Prometheus scrapes the wikantik container's /metrics over the compose
# network (already permitted by InternalNetworkFilter's 172.16/12 range).
# Grafana is published on the host; Prometheus is not.
services:
  prometheus:
    image: prom/prometheus:v3.5.3
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    # No published port — only Grafana (same network) queries Prometheus.
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    # Published on the host LAN interface — reachable as http://HOST:3000,
    # gated only by Grafana's own login. Not internet-facing.
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  prometheus-data:
  grafana-data:
