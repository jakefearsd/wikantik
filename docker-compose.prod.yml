# Prod overrides: resource limits, host bind mounts, backup service
# Usage: WIKANTIK_PAGES_DIR=/srv/wikantik/pages docker compose \
#          -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    restart: always
    # Published so the jakemon monitoring agent's Postgres exporter can
    # reach the DB via host.docker.internal:5432. DB_HOST_BIND defaults to
    # the docker0 bridge gateway, keeping the DB off the LAN.
    ports:
      - "${DB_HOST_BIND:-172.17.0.1}:5432:5432"
    # Phase-3 tuning from the 2026-05-19 scaling characterization: the
    # docker1 sweep showed CPU saturation concentrated in the hybrid-
    # retrieval search path. Larger shared_buffers + work_mem give pgvector
    # more room to keep ANN / sort / hash operations in memory and out of
    # spills. The 2G memory limit accommodates 256MB shared_buffers +
    # ~10MB × 60 backends overhead + per-op work_mem peaks safely.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=128MB"
    deploy:
      resources:
        limits:
          memory: 2G

  wikantik:
    # Build context is inherited from the base docker-compose.yml.
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      # Pages live on the host so they can be moved with rsync independently
      # of the container lifecycle. wikantik-work / wikantik-logs stay as
      # named volumes (regeneratable, no operator interest in their contents).
      - ${WIKANTIK_PAGES_DIR:-/srv/wikantik/pages}:/var/wikantik/pages
      - wikantik-work:/var/wikantik/work
      - wikantik-logs:/var/wikantik/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  backup:
    image: postgres:18-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-wikantik}
      POSTGRES_USER: ${POSTGRES_USER:-wikantik}
      PGPASSWORD: ${POSTGRES_PASSWORD:-CHANGEME}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ${WIKANTIK_PAGES_DIR:-/srv/wikantik/pages}:/var/wikantik/pages
      - ${BACKUP_DIR:-/srv/wikantik/backups}:/backups
      - ./docker/backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./docker/backup/restore.sh:/usr/local/bin/restore.sh:ro
      - ./docker/backup/crontab:/etc/crontabs/root:ro
    entrypoint: ["crond", "-f", "-d", "8"]
