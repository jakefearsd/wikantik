# Prod overrides: resource limits, host paths, backup service
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  wikantik:
    # Build from source if no pre-built image exists (fallback before CI/CD is set up)
    build: .
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/wiki/Main"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-wikantik}
      POSTGRES_USER: ${POSTGRES_USER:-wikantik}
      PGPASSWORD: ${POSTGRES_PASSWORD:-CHANGEME}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - wikantik-pages:/var/wikantik/pages
      - ${BACKUP_DIR:-./backups}:/backups
      - ./docker/backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./docker/backup/restore.sh:/usr/local/bin/restore.sh:ro
      - ./docker/backup/crontab:/etc/crontabs/root:ro
    entrypoint: ["crond", "-f", "-d", "8"]
