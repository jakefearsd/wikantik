services:
  db:
    # pgvector/pgvector:pg18 is required — the KG, hybrid retrieval, and
    # Page Graph subsystems all use the `vector` extension. The plain
    # postgres:18-alpine image does not ship the extension.
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wikantik}
      POSTGRES_USER: ${POSTGRES_USER:-wikantik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGEME}
    volumes:
      # pg18+ Docker images store data under a version-specific subdir and
      # expect the volume at /var/lib/postgresql (not .../data) — mounting
      # the old .../data path makes the image refuse to start.
      - pgdata:/var/lib/postgresql
      - ./docker/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikantik} -d ${POSTGRES_DB:-wikantik}"]
      interval: 10s
      timeout: 5s
      retries: 5

  wikantik:
    image: wikantik:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - wikantik-pages:/var/wikantik/pages
      - wikantik-work:/var/wikantik/work
      - wikantik-logs:/var/wikantik/logs
    # Host port is env-overridable so the stack can run alongside a
    # bare-metal Tomcat on 8080 (set WIKANTIK_HOST_PORT=18080 in .env).
    ports:
      - "${WIKANTIK_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  pgdata:
  wikantik-pages:
  wikantik-work:
  wikantik-logs:
