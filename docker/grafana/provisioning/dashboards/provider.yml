# Loads dashboard JSON from /etc/grafana/dashboards (bind-mounted from
# docker/grafana/dashboards) so dashboards stay version-controlled.
apiVersion: 1

providers:
  - name: Wikantik
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
