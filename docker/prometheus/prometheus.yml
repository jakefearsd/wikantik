# Prometheus scrape config for the Wikantik observability overlay.
# Loaded by the prometheus service in docker-compose.observability.yml.
global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  # The Wikantik app's Micrometer /metrics endpoint. 'wikantik' is the
  # compose service name, resolvable on the shared network; 8080 is the
  # container-internal port.
  - job_name: wikantik
    metrics_path: /metrics
    static_configs:
      - targets: ['wikantik:8080']

  # Prometheus scraping itself — useful for monitoring the monitor.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Host metrics — CPU, memory, disk, network, load average of the docker host.
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # Per-container resource usage.
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # PostgreSQL: pg_stat_* plus the Wikantik per-table IO custom query.
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
