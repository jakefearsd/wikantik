# Editorial layout for the generated docs/wikantik-pages/Main.md.
#
# Edit this file (not Main.md) to change what appears on the wiki front page.
# After editing, run:
#
#   java -cp wikantik-extract-cli/target/wikantik-extract-cli.jar \
#        com.wikantik.extractcli.GenerateMainPageCli docs/wikantik-pages --write
#
# CI runs the same command in --check mode and fails the build if Main.md
# diverges from what this file would produce.
#
# Page references are by canonical_id (the ULID in each page's frontmatter)
# rather than slug, so renames don't break Main.md. Override title or
# summary per-page when the frontmatter lacks one or the editorial voice
# differs from the page's own self-description.

intro: |
  A curated collection of in-depth research articles, organized into topic clusters. Each cluster has a hub page that introduces the topic and links to detailed sub-articles. Articles are interlinked across clusters where topics overlap.

  You can read the [site blogs here]( ../blog/) and learn about the [Wikantik Knowledge Graph Admin](WikantikKnowledgeGraphAdmin) if you want to be a power user.

footer: |
  Powered by [Wikantik](About). Articles are written as AI-assisted research — drafted with Claude, reviewed and edited by a human, and published via the [MCP API](https://modelcontextprotocol.io/). Content is organized using YAML frontmatter metadata for programmatic discovery and cross-referencing.

