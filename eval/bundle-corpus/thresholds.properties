# Per-category context-recall (and overall precision) gate floors for the bundle
# evaluation corpus. Ratchet UP as quality improves; never silently lower.
#
# Set from the Task-9 baseline (baseline minus a small epsilon, ~0.03). 0.0 until
# the baseline is frozen — so the real-corpus gate tier is wired but non-blocking
# until there is a trustworthy number to gate on.
recall.SIMILARITY.min = 0.0
recall.RELATIONAL.min = 0.0
recall.BOUNDARY.min   = 0.0
recall.OVERALL.min    = 0.0
precision.OVERALL.min = 0.0
