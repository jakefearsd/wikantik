# Per-category context-recall (and overall precision) gate floors for the bundle
# evaluation corpus. Ratchet UP as quality improves; never silently lower.
#
# Seeded from the live baseline v1 (2026-06-13, see baseline-notes.md): section recall
# 0.368 / 0.500 / 0.571 (sim/rel/bnd), 0.417 overall. Floors set ~0.05 below baseline so
# the gate catches regressions without flapping; ratchet UP as quality improves, never down.
# These are provisional until the Testcontainers gate tier re-measures via the heading-path-
# exact BundleEvalRunner; precision floor stays 0 until a section-level precision metric exists.
recall.SIMILARITY.min = 0.30
recall.RELATIONAL.min = 0.40
recall.BOUNDARY.min   = 0.45
recall.OVERALL.min    = 0.35
precision.OVERALL.min = 0.0
