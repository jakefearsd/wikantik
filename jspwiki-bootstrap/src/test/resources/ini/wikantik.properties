wikantik.provider.impl.acls=org.apache.wiki.bootstrap.spi.AclsSPITestImpl
wikantik.provider.impl.contents=org.apache.wiki.bootstrap.spi.ContentsSPITestImpl
wikantik.provider.impl.context=org.apache.wiki.bootstrap.spi.ContextSPITestImpl
wikantik.provider.impl.engine=org.apache.wiki.bootstrap.spi.EngineSPITestImpl
wikantik.provider.impl.session=org.apache.wiki.bootstrap.spi.SessionSPITestImpl

status = debug
name = jspwiki-log4j2-configuration

apenders=console
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %highlight{[%-5level]} %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1.} - %msg%n %ex

appender.rolling.name = RollingFile
appender.rolling.type = RollingFile
appender.rolling.fileName = ${sys:java.io.tmpdir}/wikantik.log
appender.rolling.filePattern = ${sys:java.io.tmpdir}/wikantik-%d{MM-dd-yy-HH-mm-ss}-%i.log.gz
appender.rolling.append = true
appender.rolling.createOnDemand = true
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %p %c{1.} %x - %msg%n %ex
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=10MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 14

# Log to console
loggers=wikantik
logger.wikantik.name = org.apache.wiki
logger.wikantik.level = debug
logger.wikantik.additivity = false
logger.wikantik.appenderRef.stdout.ref = STDOUT

rootLogger.level = info
rootLogger.appenderRef.stdout.ref = STDOUT