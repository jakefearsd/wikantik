#
# Values injected by web tests
#
jspwiki.groupdatabase           = ${it-jspwiki.groupdatabase}
jspwiki.referenceStyle          = ${it-jspwiki.referenceStyle}
jspwiki.userdatabase            = ${it-jspwiki.userdatabase}

jspwiki.fileSystemProvider.pageDir         = ${project.basedir}/target/test-classes/test-repo
jspwiki.basicAttachmentProvider.storageDir = ${project.basedir}/target/test-classes/test-repo/attachments
jspwiki.workDir                            = ${project.basedir}/target/test-classes/workdir-${it-jspwiki.context}
appender.rolling.fileName                  = ${project.basedir}/target/test-classes/jspwiki-${it-jspwiki.context}.log
appender.security.fileName                 = ${project.basedir}/target/test-classes/security-${it-jspwiki.context}.log

#
# Other overrides of standard jspwiki.properties file
#
jspwiki.xmlGroupDatabaseFile = ${project.basedir}/target/test-classes/groupdatabase.xml
jspwiki.xmlUserDatabaseFile = ${project.basedir}/target/test-classes/userdatabase.xml

jspwiki.login.throttling = false

# integration tests should start page indexing as soon as possible
jspwiki.lucene.initialdelay = 0
jspwiki.lucene.indexdelay = 1

# Security logging configuration (Log4j 2.x format)
logger.security.name = SecurityLog
logger.security.level = info
logger.security.additivity = false
logger.security.appenderRef.security.ref = SecurityAppender

appender.security.name = SecurityAppender
appender.security.type = RollingFile
appender.security.filePattern = ${project.basedir}/target/test-classes/security-${it-jspwiki.context}-%i.log.gz
appender.security.layout.type = PatternLayout
appender.security.layout.pattern = %d %p - %m%n
appender.security.policies.type = Policies
appender.security.policies.size.type = SizeBasedTriggeringPolicy
appender.security.policies.size.size = 10MB
appender.security.strategy.type = DefaultRolloverStrategy
appender.security.strategy.max = 5

jspwiki.preferences.default-locale=en

# URL Constructor - use ShortViewURLConstructor for clean URLs
jspwiki.urlConstructor = ShortViewURLConstructor
jspwiki.shortURLConstructor.prefix = wiki/