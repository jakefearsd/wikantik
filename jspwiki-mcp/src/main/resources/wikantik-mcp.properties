# MCP server identity
mcp.server.name = jspwiki-mcp
mcp.server.title = JSPWiki Knowledge Base
mcp.server.version = 2.0.0

# Instructions file loaded from classpath (plain text).
# To customise, place your own jspwiki-mcp-instructions.txt on the classpath
# (e.g. in tomcat/lib/) or set mcp.instructions inline below.
mcp.instructions.file = jspwiki-mcp-instructions.txt
# mcp.instructions = (inline instructions text, used when file is not found)

# Access control — a request passes if it matches EITHER a valid API key OR an allowed IP.
# Both unconfigured means unrestricted access (backwards-compatible).
# mcp.access.keys =                   # comma-separated Bearer tokens
# mcp.access.key =                    # legacy single-key (use mcp.access.keys instead)
# mcp.access.allowedCidrs =           # comma-separated CIDR blocks

# *** SECURITY WARNING ***
# If both mcp.access.keys and mcp.access.allowedCidrs are empty/unset,
# ALL traffic to the /mcp endpoint is permitted (unrestricted mode).
# For production, configure at least one of the above.

# Rate limiting (requests per second, 0 = disabled)
mcp.ratelimit.global = 100
mcp.ratelimit.perClient = 10
