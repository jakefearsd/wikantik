# MCP server identity
mcp.server.name = wikantik-mcp
mcp.server.title = Wikantik Knowledge Base
mcp.server.version = 2.0.0

# Instructions file loaded from classpath (plain text).
# To customise, place your own wikantik-mcp-instructions.txt on the classpath
# (e.g. in tomcat/lib/) or set mcp.instructions inline below.
mcp.instructions.file = wikantik-mcp-instructions.txt
# mcp.instructions = (inline instructions text, used when file is not found)

# Access control — a request passes if it matches EITHER a valid API key OR an allowed IP.
# The preferred path is to generate DB-backed keys via the admin UI at /admin/apikeys
# (scope=mcp or scope=all). Those keys are bound to a Wikantik principal so JAAS/ACLs
# apply to each call exactly as they would for that user's interactive session.
# mcp.access.keys =                   # legacy comma-separated Bearer tokens (no principal binding)
# mcp.access.key =                    # legacy single-key (use mcp.access.keys instead)
# mcp.access.allowedCidrs =           # comma-separated CIDR blocks

# *** SECURITY ***
# When both mcp.access.keys and mcp.access.allowedCidrs are empty/unset the filter
# fails closed: every MCP request is rejected with HTTP 503 and a CRITICAL line is
# logged at startup. To explicitly allow unauthenticated access (for a trusted local
# deployment) set:
#   mcp.access.allowUnrestricted = true
# In that mode every MCP caller is treated as a superuser.
# mcp.access.allowUnrestricted = false

# Rate limiting (requests per second, 0 = disabled)
mcp.ratelimit.global = 100
mcp.ratelimit.perClient = 10
