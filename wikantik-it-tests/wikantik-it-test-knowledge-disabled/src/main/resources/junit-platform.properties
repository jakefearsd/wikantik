# JUnit 5 execution config for the KG-disabled IT module.
# This module runs two IT classes against one Cargo Tomcat deployed with
# wikantik.knowledge.enabled=false: a wire-level suite (KnowledgeDisabledIT,
# REST 503s + knowledge-mcp tool absence) and one Selenide browser suite
# (KnowledgeGraphNavDisabledIT, KG nav entries absent in the SPA).
# The parallel infrastructure is enabled for parity with the shared
# wikantik-selenide-tests config, but BOTH defaults are same_thread and no
# class here opts in via @Execution(CONCURRENT), so the run is fully
# sequential — the browser IT and the wire IT share the single Tomcat and
# must not race each other. The fixed parallelism cap only takes effect if a
# future class opts in; keep opt-ins to read-only assertions.
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = same_thread
junit.jupiter.execution.parallel.mode.classes.default = same_thread
junit.jupiter.execution.parallel.config.strategy = fixed
junit.jupiter.execution.parallel.config.fixed.parallelism = 3
