#
# SSO IT — this file intentionally duplicates (rather than imports) the shared
# wikantik-selenide-tests custom.properties so SSO-specific overrides are
# self-contained and unambiguous. Maven's resource handling makes the later
# resource win at the file level, not the key level, so a partial overlay
# wouldn't work.
#
# Values injected by web tests
#
wikantik.groupdatabase           = ${it-wikantik.groupdatabase}
wikantik.referenceStyle          = ${it-wikantik.referenceStyle}
wikantik.userdatabase            = ${it-wikantik.userdatabase}

wikantik.pageProvider = VersioningFileProvider
wikantik.fileSystemProvider.pageDir         = ${project.basedir}/target/test-classes/test-repo
wikantik.basicAttachmentProvider.storageDir = ${project.basedir}/target/test-classes/test-repo/attachments
wikantik.workDir                            = ${project.basedir}/target/test-classes/workdir-${it-wikantik.context}
appender.rolling.fileName                  = ${project.basedir}/target/test-classes/wikantik-${it-wikantik.context}.log
appender.security.fileName                 = ${project.basedir}/target/test-classes/security-${it-wikantik.context}.log

#
# Other overrides of standard wikantik.properties file
#
wikantik.xmlGroupDatabaseFile = ${project.basedir}/target/test-classes/groupdatabase.xml
wikantik.xmlUserDatabaseFile = ${project.basedir}/target/test-classes/userdatabase.xml

wikantik.login.throttling = false

# integration tests should start page indexing as soon as possible
wikantik.lucene.initialdelay = 0
wikantik.lucene.indexdelay = 1

# Security logging configuration (Log4j 2.x format)
logger.security.name = SecurityLog
logger.security.level = info
logger.security.additivity = false
logger.security.appenderRef.security.ref = SecurityAppender

appender.security.name = SecurityAppender
appender.security.type = RollingFile
appender.security.filePattern = ${project.basedir}/target/test-classes/security-${it-wikantik.context}-%i.log.gz
appender.security.layout.type = PatternLayout
appender.security.layout.pattern = %d %p - %m%n
appender.security.policies.type = Policies
appender.security.policies.size.type = SizeBasedTriggeringPolicy
appender.security.policies.size.size = 10MB
appender.security.strategy.type = DefaultRolloverStrategy
appender.security.strategy.max = 5

wikantik.preferences.default-locale=en

# Pac4j debug logging for this IT — we want to see the auth-request / callback
# parameter flow when diagnosing OIDC exchange failures.
logger.pac4j.name = org.pac4j
logger.pac4j.level = debug
logger.pac4j.additivity = false
logger.pac4j.appenderRef.stdout.ref = STDOUT

logger.nimbus.name = com.nimbusds
logger.nimbus.level = debug
logger.nimbus.additivity = false
logger.nimbus.appenderRef.stdout.ref = STDOUT

# wikantik auth stack — trace SSOLoginModule + DefaultAuthenticationManager so we
# can see whether the post-callback request actually runs JAAS login and pulls
# the pac4j OidcProfile out of the HTTP session.
logger.wikantik-auth.name = com.wikantik.auth
logger.wikantik-auth.level = debug
logger.wikantik-auth.additivity = false
logger.wikantik-auth.appenderRef.stdout.ref = STDOUT

# URL Constructor - use ShortViewURLConstructor for clean URLs
wikantik.urlConstructor = ShortViewURLConstructor
wikantik.shortURLConstructor.prefix = wiki/

#
# --- SSO / OIDC overrides -----------------------------------------------------
#
# Cargo deploys this WAR at /${it-wikantik.context}; pac4j builds redirect_uri
# by concatenating baseURL + /sso/callback, so baseURL must be the absolute
# context URL.
wikantik.baseURL = http://localhost:8080/${it-wikantik.context}

wikantik.sso.enabled                = true
wikantik.sso.type                   = oidc
wikantik.sso.autoProvision          = true

# mock-oauth2-server issues tokens under issuer http://localhost:8088/default
# and exposes discovery at the URL below. The WAR (running in Cargo on the
# host) and the headless browser (also on the host) can both reach localhost.
wikantik.sso.oidc.discoveryUri      = http://localhost:8088/default/.well-known/openid-configuration
wikantik.sso.oidc.clientId          = wikantik-it
wikantik.sso.oidc.clientSecret      = test-secret
wikantik.sso.oidc.scope             = openid profile email

# mock-oauth2-server emits `sub` (not `preferred_username`) in the default
# token. Two mappings exist and both need to point at `sub`:
#   - SSOConfig's claim mapping (used by SSOAutoProvisionService for the
#     new-user row in the UserDatabase).
#   - The JAAS LoginModule options consumed by SSOLoginModule to resolve the
#     WikiPrincipal login name.
wikantik.sso.claimMapping.loginName = sub
wikantik.sso.claimMapping.fullName  = name
wikantik.sso.claimMapping.email     = email

wikantik.loginModule.options.sso.claimLoginName = sub
wikantik.loginModule.options.sso.claimFullName  = name
wikantik.loginModule.options.sso.claimEmail     = email
