# ArchUnit configuration for wikantik-main subsystem decomposition.
# See docs/superpowers/specs/2026-05-05-wikantik-main-decomposition-design.md
#
# Violations are recorded as a per-rule text file under the path below so
# the freeze captures snapshots that can be diffed in code review.
freeze.store.default.path=src/test/resources/archunit_store
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true
freeze.refreeze=false
