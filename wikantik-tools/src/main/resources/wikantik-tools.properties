# Wikantik OpenAPI tool server — defaults. Override by placing a file with the
# same name on the parent classloader (e.g. tomcat/lib/wikantik-tools.properties).

# Access control — a request passes if it matches EITHER a valid API key OR an allowed IP.
# tools.access.keys =                   # comma-separated Bearer tokens
# tools.access.allowedCidrs =           # comma-separated CIDR blocks

# *** SECURITY ***
# When both tools.access.keys and tools.access.allowedCidrs are empty/unset the filter
# fails closed: every tool request is rejected with HTTP 503 and a CRITICAL line is
# logged at startup. To explicitly allow unauthenticated access (e.g. a trusted local
# deployment) set:
#   tools.access.allowUnrestricted = true
# tools.access.allowUnrestricted = false

# Rate limiting (requests per second, 0 = disabled)
tools.ratelimit.global = 100
tools.ratelimit.perClient = 10

# Public base URL used to build citation links in tool responses. Leave unset to fall
# back to the request scheme/host (correct in direct deployments; set explicitly when
# behind a reverse proxy that rewrites host headers).
# wikantik.public.baseURL = https://wiki.example.com

