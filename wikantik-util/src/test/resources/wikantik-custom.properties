#
# Custom configuration file used by most JUnit tests overriding
# certain default values in src/main/resources/ini/wikantik.properties
#
wikantik.fileSystemProvider.pageDir = target/test-classes/testrepository
wikantik.workDir = target/test-classes/testworkdir
wikantik.searchProvider = LuceneSearchProvider

wikantik.translatorReader.camelCaseLinks = true
wikantik.breakTitleWithSpaces = true
wikantik.translatorReader.useOutlinkImage = false
wikantik.basicAttachmentProvider.storageDir = target/test-classes/testrepository
wikantik.encoding = ISO-8859-1
wikantik.filterConfig = /filters.xml
wikantik.referenceStyle = relative
wikantik.authorizer=com.wikantik.TestAuthorizer

# log file under ./target
appender.rolling.fileName=./target/logs/wikantik.log

# RSS under ./target
# if it starts with / it's considered an absolute path
# relative path names are anchored from the webapp root path
wikantik.rss.fileName=./target/rss.rdf

#
# Security: use standard providers for user/group auth, user management
# and ACLs. Use a test userdatabase for storing users.
#
wikantik.xmlGroupDatabaseFile = target/test-classes/groupdatabase.xml
wikantik.xmlUserDatabaseFile = target/test-classes/userdatabase.xml

# Security logging configuration (Log4j 2.x format)
logger.security.name = SecurityLog
logger.security.level = info
logger.security.additivity = false
logger.security.appenderRef.security.ref = SecurityAppender

appender.security.name = SecurityAppender
appender.security.type = RollingFile
appender.security.fileName = ./target/logs/security.log
appender.security.filePattern = ./target/logs/security-%i.log.gz
appender.security.layout.type = PatternLayout
appender.security.layout.pattern = %d %p - %m%n
appender.security.policies.type = Policies
appender.security.policies.size.type = SizeBasedTriggeringPolicy
appender.security.policies.size.size = 10MB
appender.security.strategy.type = DefaultRolloverStrategy
appender.security.strategy.max = 5

# Used by CommandResolverTest
wikantik.specialPage.RecentChanges = RecentChanges.jsp
wikantik.specialPage.Search = Search.jsp

# Used by WikantikMarkupParserTest
wikantik.translatorReader.inlinePattern.1 = *.jpg
wikantik.translatorReader.inlinePattern.2 = *.png
wikantik.translatorReader.inlinePattern.3 = http://images.com/*

# Fields needed in order to run MailUtilTest
#mail.smtp.host = 127.0.0.1
#mail.smtp.port = 25
#mail.from = Wikantik <Wikantik@localhost>
#mail.smtp.account =
#mail.smtp.password =
mail.smtp.ssl.protocols=TLSv1.2

# for JDBC tests
server.port=9321
server.database.0=file:target/wikantik.hsqldb
server.dbname.0=jspwiki

jdbc.admin.id=SA
jdbc.admin.password=
jdbc.driver.class=org.hsqldb.jdbc.JDBCDriver
jdbc.driver.id=hsql
jdbc.driver.url=jdbc\:hsqldb\:hsql\://localhost:9321/jspwiki
jdbc.user.id=jspwiki
jdbc.user.password=password
